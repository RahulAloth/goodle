services:
  goodle:
    build: .
    container_name: goodle_app
    ports:
      - "8501:8501"
    volumes:
      # IMPORTANT:
      # Replace the left side with YOUR LOCAL INDEXING DIRECTORY.
      # This is the folder on your machine that Goodle will index.

      # Linux example:
      # - /home/rahul/goodleTest:/app/goodle_data

      # Windows example:
      # - D:/goodleTest:/app/goodle_data

      - ./goodle_index.json:/app/goodle_index.json

    restart: unless-stopped
    command: >
      sh -c "echo 'Goodle is running at: http://localhost:8501' &&
             streamlit run goodle_app.py --server.port=8501 --server.address=0.0.0.0"
